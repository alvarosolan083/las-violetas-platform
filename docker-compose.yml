version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: postgres_las_violetas
    restart: always
    environment:
      POSTGRES_PASSWORD: CHANGE_ME
      POSTGRES_DB: las_violetas
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis_las_violetas
    ports:
      - "6379:6379"

volumes:
  pgdata:
